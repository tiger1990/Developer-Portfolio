<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#020617" />
    <title>Motivational Quotes · Deepak Panwar</title>

    <!-- Tailwind CSS via CDN for this standalone page -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="min-h-screen bg-slate-950 text-white">
    <!-- Dynamic background image -->
    <div id="mq-bg" class="fixed inset-0 -z-20 bg-center bg-cover bg-no-repeat"></div>
    <!-- Dark overlay for readability -->
    <div
      class="fixed inset-0 -z-10 bg-gradient-to-b from-black/80 via-black/60 to-black/80 pointer-events-none"
    ></div>

    <header class="w-full">
      <div
        class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8 sm:py-5"
      >
        <a
          href="./index.html"
          class="inline-flex items-center gap-2 rounded-xl border border-white/15 bg-white/5 px-4 py-2 text-sm text-white/90 shadow-sm shadow-black/30 transition hover:bg-white/10"
          aria-label="Back to portfolio"
        >
          <span aria-hidden="true">←</span>
          <span>Back to portfolio</span>
        </a>

        <div class="text-right">
          <div class="text-xs font-semibold uppercase tracking-[0.16em] text-emerald-300/90">
            Ask Deepak Codes
          </div>
          <div class="text-sm text-white/70">Motivation · Growth · Focus</div>
        </div>
      </div>
    </header>

    <main
      class="mx-auto grid min-h-[calc(100vh-4rem)] max-w-6xl place-items-center px-4 pb-10 pt-4 sm:px-6 lg:px-8 sm:pt-2"
    >
      <section
        class="w-full max-w-2xl rounded-3xl border border-white/15 bg-white/10 p-6 shadow-2xl shadow-black/40 backdrop-blur-xl sm:p-10"
        aria-label="Motivational quote generator"
      >
        <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
          <div>
            <h1 class="text-2xl font-semibold tracking-tight sm:text-3xl">
              Motivational Quote Generator
            </h1>
            <p class="mt-1 text-sm text-white/70">
              Tap into a new quote and a fresh backdrop every time you need a nudge forward.
            </p>
          </div>

          <div class="shrink-0">
            <span
              id="mq-status"
              class="inline-flex items-center gap-2 rounded-full border border-emerald-400/30 bg-emerald-500/10 px-3 py-1.5 text-xs text-emerald-200 shadow-sm shadow-emerald-500/40"
            >
              <span class="relative flex h-2 w-2">
                <span
                  class="absolute inline-flex h-full w-full animate-ping rounded-full bg-emerald-400 opacity-75"
                ></span>
                <span class="relative inline-flex h-2 w-2 rounded-full bg-emerald-400"></span>
              </span>
              <span id="mq-status-text">Loading…</span>
            </span>
          </div>
        </div>

        <div
          id="mq-quote-wrapper"
          class="mt-8 transform-gpu text-center text-xl font-semibold leading-relaxed tracking-tight text-white opacity-0 transition-all duration-300 ease-out sm:text-2xl"
        >
          <blockquote>
            <span class="text-white/80">“</span>
            <span id="mq-quote-text">Loading…</span>
            <span class="text-white/80">”</span>
          </blockquote>
          <p id="mq-quote-author" class="mt-4 text-sm font-medium text-white/70 sm:text-base">—</p>
        </div>

        <div class="mt-8 grid gap-3 sm:grid-cols-3">
          <button
            id="mq-new"
            type="button"
            class="inline-flex items-center justify-center rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-950 shadow-md shadow-black/40 transition hover:bg-white/90 disabled:cursor-not-allowed disabled:opacity-70"
          >
            New Quote
          </button>

          <button
            id="mq-copy"
            type="button"
            class="inline-flex items-center justify-center rounded-2xl border border-white/20 bg-white/5 px-4 py-3 text-sm font-medium text-white/90 shadow-sm shadow-black/40 transition hover:bg-white/10 disabled:cursor-not-allowed disabled:opacity-70"
          >
            Copy Quote
          </button>

          <a
            id="mq-share"
            href="#"
            target="_blank"
            rel="noreferrer"
            class="inline-flex items-center justify-center rounded-2xl border border-white/20 bg-white/5 px-4 py-3 text-center text-sm font-medium text-white/90 shadow-sm shadow-black/40 transition hover:bg-white/10"
          >
            Share to X
          </a>
        </div>

        <p class="mt-6 text-center text-[11px] text-white/55">
          Backgrounds via Unsplash. Quotes from a public API with an offline-safe fallback.
        </p>
      </section>
    </main>

    <script src="./js/quotes.js" defer></script>
  </body>
</html>
